syntax = "proto3";

message ExecutorRequest {
  // Dummy request for QPU Executor service
  string message = 1;
}

message ExecutorResponse {
  string message = 1;
  bool success = 2;
}

// Gate definition matching Python Gate model
message Gate {
  string symbol = 1;                    // Gate name (e.g., "H", "CNOT", "RZ")
  repeated int32 target_qubits = 2;     // Target qubit indices
  repeated int32 control_qubits = 3;    // Control qubit indices
  repeated double params = 4;           // Gate parameters (e.g., rotation angles)
}

// Request to submit a circuit task
message SubmitCircuitTaskRequest {
  repeated Gate gates = 1;              // List of gates in the circuit
  int32 shots = 2;                      // Number of measurement shots
}

// Response after submitting a circuit task
message SubmitCircuitTaskResponse {
  string task_id = 1;                   // UUID of the enqueued task
  bool success = 2;                     // Whether enqueue succeeded
  string message = 3;                   // Optional message (e.g., error details)
}

// Request to submit a test task
message SubmitTestTaskRequest {
  string symbol = 1;                    // Test name (e.g., "XEB", "RB")
  repeated int32 params = 2;            // Test parameters
  int32 shots = 3;                      // Number of measurement shots
}

// Response after submitting a test task
message SubmitTestTaskResponse {
  string task_id = 1;                   // UUID of the enqueued task
  bool success = 2;                     // Whether enqueue succeeded
  string message = 3;                   // Optional message (e.g., error details)
}

// Request to retrieve a result by task ID
message GetResultRequest {
  string task_id = 1;
}

// A circuit result payload
message CircuitResultPayload {
  string task_id = 1;
  map<string, int32> distribution = 2;
}

// A test result payload
message TestResultPayload {
  string task_id = 1;
  map<string, double> parameters = 2;
}

// A control ack payload
message ControlAckPayload {
  string task_id = 1;
  string status = 2;
  string message = 3;
}

// Response carrying exactly one result type, or a not-found signal
message GetResultResponse {
  bool found = 1;
  string error_message = 2;
  oneof result {
    CircuitResultPayload circuit_result = 3;
    TestResultPayload    test_result    = 4;
    ControlAckPayload    control_ack    = 5;
  }
}

service QPUExecutor {
  rpc Ping(ExecutorRequest) returns (ExecutorResponse);
  rpc SubmitCircuitTask(SubmitCircuitTaskRequest) returns (SubmitCircuitTaskResponse);
  rpc SubmitTestTask(SubmitTestTaskRequest) returns (SubmitTestTaskResponse);
  rpc GetResult(GetResultRequest) returns (GetResultResponse);
}