# lccfq-backend Configuration File
# This is the default configuration file for the LCCF Quantum backend service.
# Copy this to config.toml and customize for your setup.

# Logging settings
log_level = "INFO"  # DEBUG, INFO, WARNING, ERROR, CRITICAL

# Watchdog settings
with_watchdog = true
watchdog_interval = 300  # Check QPU health every 300 seconds (5 minutes)

# gRPC server settings
with_grpc = true
grpc_address = "[::]"  # [::] binds to all IPv4/IPv6 interfaces
grpc_port = 50052
grpc_max_workers = 10
cert_dir = "./certs"

# Hardware manager client settings
hwman_mock_mode = true  # Set to false when connecting to real hardware manager
hwman_address = "localhost"
hwman_port = 50222
hwman_cert_dir = "./certs"
hwman_client_name = "backend_client"